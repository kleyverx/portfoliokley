<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Portfolio Kley 😁</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Abril Fatface', cursive;
            background-color: #1a1a1a;
        }
        .bento-item {
            transition: all 0.3s ease;
            background-color: #FEFAE0;
        }
        .bento-item:hover {
            transform: translateY(-5px);
        }
        .expanded {
            grid-column: span 2;
            grid-row: span 2;
        }
        .active {
            box-shadow: 0 10px 15px -3px rgba(254, 250, 224, 0.1), 0 4px 6px -2px rgba(254, 250, 224, 0.05);
        }
    </style>
</head>
<body class="p-8 bg-gray-900 text-gray-100">
    <h1 class="text-5xl font-bold text-center mb-8 text-[#FEFAE0]">Mi Portafolio</h1>
    <div id="bento-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <!-- Los elementos del Bento se generarán aquí con JavaScript -->
    </div>

    <script>
        const bentoItems = [
            { id: 1, title: 'Sobre mí', icon: '👤', content: `
                <div class="flex flex-col md:flex-row items-center mb-4">
                    <img src="1.jpg" alt="Kleyver Urbina" class="w-24 h-24 rounded-full mr-4 mb-4 md:mb-0 object-cover aspect-[3/4]">
                    <div>
                        <h3 class="text-xl font-bold mb-2 text-gray-800">Kleyver Urbina 19 años</h3>
                        <p class="text-gray-700">Desarrollador Full Stack apasionado con experiencia en HTML, CSS, JavaScript, Python y PHP.</p>
                    </div>
                </div>
            `, isOpen: true },
            { id: 2, title: 'Proyecto', icon: '💻', content: `
                <div class="grid md:grid-cols-2 gap-4 mt-4">
                    <img src="2.png" alt="Proyecto 1" class="rounded-lg w-full h-auto object-cover">
                    <div>
                        <h3 class="text-xl font-bold mb-2 text-gray-800">Ecommerce</h3>
                        <p class="text-gray-700 mb-2">Tienda desarrollada con HTML, CSS, JavaScript y PHP bajo el framework Laravel.</p>
                        <a href="https://bmv-store.com/" target="_blank" rel="noopener noreferrer" class="text-blue-600 hover:underline">Ver proyecto</a>
                    </div>
                </div>
            ` },
            { id: 3, title: 'Experiencia', icon: '🏢', content: `
                <div class="mt-2">
                    <h3 class="text-lg font-semibold mb-2 text-gray-800">Estudiante de Ingeniería en Informática</h3>
                    <p class="text-gray-700">2 años de experiencia académica y práctica en desarrollo de software.</p>
                </div>
            ` },
            { id: 4, title: 'Habilidades', icon: '⭐', content: `
                <div class="grid grid-cols-2 gap-4 mt-4">
                    ${[
                        { name: 'PHP', level: 75, icon: 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/php/php-plain.svg' },
                        { name: 'CSS', level: 90, icon: 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/css3/css3-plain.svg' },
                        { name: 'HTML', level: 95, icon: 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/html5/html5-plain.svg' },
                        { name: 'JavaScript', level: 70, icon: 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/javascript/javascript-plain.svg' },
                        { name: 'Python', level: 45, icon: 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/python/python-plain.svg' },
                        { name: 'Figma', level: 60, icon: 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/figma/figma-original.svg' },
                    ].map(skill => `
                        <div class="flex flex-col items-center">
                            <img src="${skill.icon}" alt="${skill.name}" class="w-12 h-12 mb-2">
                            <div class="w-full bg-gray-300 rounded-full h-2.5 mb-1">
                                <div class="bg-blue-600 h-2.5 rounded-full" style="width: ${skill.level}%"></div>
                            </div>
                            <p class="text-sm text-gray-600">${skill.name} - ${skill.level}%</p>
                        </div>
                    `).join('')}
                </div>
            ` },
            { id: 5, title: 'GitHub', icon: '🐙', content: `
                <a href="https://github.com/kleyverx" target="_blank" rel="noopener noreferrer" class="text-blue-600 hover:underline">
                    github.com/kleyverx
                </a>
            ` },
            { id: 6, title: 'LinkedIn', icon: '🔗', content: `
                <a href="https://www.linkedin.com/in/kleyver-cadrazco-655578327/" target="_blank" rel="noopener noreferrer" class="text-blue-600 hover:underline">
                    linkedin.com/in/kleyver-cadrazco-655578327
                </a>
            ` },
            { id: 7, title: 'Contacto', icon: '✉️', content: `
                <a href="mailto:kleyvercell2@gmail.com" class="text-blue-600 hover:underline">
                    kleyvercell2@gmail.com
                </a>
            ` },
        ];

        const bentoGrid = document.getElementById('bento-grid');

        bentoItems.forEach(item => {
            const bentoItem = document.createElement('div');
            bentoItem.className = `bento-item p-6 rounded-lg shadow-md cursor-pointer transition-all duration-300 ease-in-out transform hover:scale-105 ${item.isOpen ? 'expanded active' : ''}`;
            bentoItem.innerHTML = `
                <div class="flex items-center mb-4">
                    <span class="text-3xl mr-2">${item.icon}</span>
                    <h2 class="text-2xl font-bold text-gray-800">${item.title}</h2>
                </div>
                <div class="${item.isOpen ? '' : 'hidden'} content">${item.content}</div>
            `;
            bentoItem.addEventListener('click', () => toggleExpand(bentoItem));
            bentoGrid.appendChild(bentoItem);
        });

        function toggleExpand(item) {
            if (!item.classList.contains('expanded')) {
                const expandedItems = document.querySelectorAll('.expanded');
                expandedItems.forEach(expandedItem => {
                    expandedItem.classList.remove('expanded', 'active');
                    expandedItem.querySelector('.content').classList.add('hidden');
                });
            }
            item.classList.toggle('expanded');
            item.classList.toggle('active');
            const content = item.querySelector('.content');
            content.classList.toggle('hidden');
        }
    </script>
</body>
</html>
