<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Portfolio Bento</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.10.4/gsap.min.js"></script>
    <style>
        body {
            font-family: 'Abril Fatface', cursive;
            background-color: #1a1a1a;
        }
        .bento-item {
            transition: all 0.3s ease;
            background-color: #FEFAE0;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .bento-item:hover {
            transform: translateY(-5px);
        }
        .expanded {
            grid-column: span 2;
            grid-row: span 2;
        }
        .active {
            box-shadow: 0 10px 15px -3px rgba(254, 250, 224, 0.1), 0 4px 6px -2px rgba(254, 250, 224, 0.05);
        }
        @media (max-width: 640px) {
            .expanded {
                grid-column: span 1;
                grid-row: span 1;
            }
        }
        .project-card {
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            transition: transform 0.3s ease;
        }
        .project-card:hover {
            transform: translateY(-5px);
        }
        .skill-bar {
            background-color: #e0e0e0;
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        .skill-bar-inner {
            height: 10px;
            border-radius: 5px;
        }
        .experience-item {
            margin-bottom: 20px;
        }
        .goog-te-banner-frame.skiptranslate, .goog-te-gadget-icon {
            display: none !important;
        }
        .goog-te-gadget-simple {
            background-color: transparent !important;
            border: none !important;
            font-size: 1rem !important;
            color: #FEFAE0 !important;
        }
        .goog-te-gadget-simple .goog-te-menu-value {
            color: #FEFAE0 !important;
        }
        .goog-te-gadget-simple .goog-te-menu-value span {
            display: none !important;
        }
        .goog-te-gadget-simple .goog-te-menu-value:after {
            content: '🌐';
            font-size: 1.5rem;
            margin-left: 0.5rem;
        }
        .carousel {
            position: relative;
            width: 100%;
            overflow: hidden;
        }
        .carousel-inner {
            display: flex;
            transition: transform 0.5s ease;
        }
        .carousel-item {
            min-width: 100%;
            box-sizing: border-box;
        }
    </style>
</head>
<body class="p-4 sm:p-6 md:p-8 bg-gray-900 text-gray-100">
    <h1 class="text-3xl sm:text-4xl md:text-5xl font-bold text-center mb-6 sm:mb-8 text-[#FEFAE0]">Mi Portfolio</h1>
    
    <div id="bento-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-6">
        <!-- Los elementos del Bento se generarán aquí con JavaScript -->
    </div>

    <footer class="text-center mt-8">
        <!-- Selector de idioma -->
        <div id="google_translate_element"></div>
    </footer>

    <script>
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'es', includedLanguages: 'en,fr,de,it,pt,zh-CN,ja,ko,ru'}, 'google_translate_element');
        }
    </script>
    <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <script>
        const bentoItems = [
            { id: 1, title: 'Sobre mí', icon: '👤', content: `
                <div class="flex flex-col sm:flex-row items-center mb-4">
                    <img src="assets/1.png" alt="Kleyver Urbina" class="w-20 h-20 sm:w-24 sm:h-24 rounded-full mr-0 sm:mr-4 mb-4 sm:mb-0 object-cover aspect-[3/4]">
                    <div>
                        <h3 class="text-lg sm:text-xl font-bold mb-2 text-gray-800">Kleyver Urbina 20 años</h3>
                        <p class="text-sm sm:text-base text-gray-700">Desarrollador Full Stack apasionado con experiencia en desarrollo de software y aplicaciones web</p>
                    </div>
                </div>
            `, isOpen: true },
            { id: 2, title: 'Proyectos', icon: '💻', content: `
                <div class="project-card p-4">
                    <div class="carousel">
                        <div class="carousel-inner">
                            <div class="carousel-item">
                                <img src="assets/proyecto1/2.png" alt="Proyecto 1" class="rounded-lg w-full h-auto object-cover aspect=[3/4] mb-4">
                            </div>
                            <div class="carousel-item">
                                <img src="assets/proyecto1/3.png" alt="Proyecto 2" class="rounded-lg w-full h-auto object-cover aspect=[3/4] mb-4">
                            </div>
                            <div class="carousel-item">
                                <img src="assets/proyecto1/4.png" alt="Proyecto 3" class="rounded-lg w-full h-auto object-cover aspect=[3/4] mb-4">
                            </div>
                        </div>
                    </div>
                    <h3 class="text-lg sm:text-xl font-bold mb-2 text-gray-800">E-commerce</h3>
                    <p class="text-sm sm:text-base text-gray-700 mb-2">Tienda desarrollada con HTML, CSS, JavaScript y PHP bajo el framework Laravel.</p>
                    <a href="https://bmv-store.com/" target="_blank" rel="noopener noreferrer" class="text-blue-600 hover:underline text-sm sm:text-base">Ver proyecto</a>
                </div>
            ` },
            { id: 3, title: 'Experiencia', icon: '🏢', content: `
                <div class="experience-item">
                    <h3 class="text-lg font-semibold mb-2 text-gray-800">Estudiante de Ingeniería en Informática (TSU)</h3>
                    <p class="text-sm sm:text-base text-gray-700">3 años de experiencia académica y práctica en desarrollo de software.</p>
                </div>
            ` },
            { id: 4, title: 'Habilidades', icon: '⭐', content: `
                <div class="grid grid-cols-2 gap-4 mt-4">
                    ${[
                        { name: 'PHP', level: 75, icon: 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/php/php-plain.svg', color: '#4F5D95' },
                        { name: 'CSS', level: 90, icon: 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/css3/css3-plain.svg', color: '#264de4' },
                        { name: 'HTML', level: 95, icon: 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/html5/html5-plain.svg', color: '#e34c26' },
                        { name: 'JavaScript', level: 70, icon: 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/javascript/javascript-plain.svg', color: '#f0db4f' },
                        { name: 'Python', level: 45, icon: 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/python/python-plain.svg', color: '#306998' },
                        { name: 'Figma', level: 60, icon: 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/figma/figma-original.svg', color: '#f24e1e' },
                        { name: 'Laravel', level: 80, icon: 'https://www.svgrepo.com/show/353985/laravel.svg', color: '#ff2d20' },
                        { name: 'Tailwind CSS', level: 85, icon: 'https://www.svgrepo.com/show/374118/tailwind.svg', color: '#38b2ac' },
                        { name: 'MongoDB', level: 50, icon: 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/mongodb/mongodb-plain.svg', color: '#47A248' },
                        { name: 'Typescript', level: 50, icon: 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/typescript/typescript-plain.svg', color: '#3178c6' },
                        { name: 'Node.js', level: 50, icon: 'https://www.svgrepo.com/show/354119/nodejs-icon.svg', color: '#68a063' },
                        {name: 'Mysql', level: 75, icon: 'https://www.svgrepo.com/show/373848/mysql.svg', color: '#4479a1' },
                        { name: 'Angular', level: 50, icon: 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/angularjs/angularjs-plain.svg', color: '#dd1b16' },
                        
                    ].map(skill => `
                        <div class="flex flex-col items-center">
                            <img src="${skill.icon}" alt="${skill.name}" class="w-8 h-8 sm:w-12 sm:h-12 mb-2">
                            <div class="skill-bar w-full">
                                <div class="skill-bar-inner" style="width: ${skill.level}%; background-color: ${skill.color};"></div>
                            </div>
                            <p class="text-xs sm:text-sm text-gray-600">${skill.name} - ${skill.level}%</p>
                        </div>
                    `).join('')}
                </div>
            ` },
            { id: 5, title: 'GitHub', icon: '🐙', content: `
                <a href="https://github.com/kleyverx" target="_blank" rel="noopener noreferrer" class="text-blue-600 hover:underline text-sm sm:text-base">
                  github.com/kleyverx
                </a>
            ` },
            { id: 6, title: 'LinkedIn', icon: '🔗', content: `
                <a href="https://www.linkedin.com/in/kleyver-cadrazco-655578327/" target="_blank" rel="noopener noreferrer" class="text-blue-600 hover:underline text-sm sm:text-base">
                    linkedin.com/in/kleyver-cadrazco-655578327
                </a>
            ` },
            { id: 7, title: 'Contacto', icon: '✉️', content: `
                <a href="mailto:kleyvercell2@gmail.com" class="text-blue-600 hover:underline text-sm sm:text-base">
                    kleyvercell2@gmail.com
                </a>
            ` },
        ];

        const bentoGrid = document.getElementById('bento-grid');

        bentoItems.forEach(item => {
            const bentoItem = document.createElement('div');
            bentoItem.className = `bento-item p-4 sm:p-6 rounded-lg shadow-md cursor-pointer transition-all duration-300 ease-in-out transform hover:scale-105 ${item.isOpen ? 'expanded active' : ''}`;
            bentoItem.innerHTML = `
                <div class="flex items-center mb-4">
                    <span class="text-2xl sm:text-3xl mr-2">${item.icon}</span>
                    <h2 class="text-xl sm:text-2xl font-bold text-gray-800">${item.title}</h2>
                </div>
                <div class="${item.isOpen ? '' : 'hidden'} content">${item.content}</div>
            `;
            bentoItem.addEventListener('click', () => {
                toggleExpand(bentoItem);
            });
            bentoGrid.appendChild(bentoItem);
        });

        function toggleExpand(item) {
            const isMobile = window.innerWidth <= 640;
            if (!item.classList.contains('expanded')) {
                const expandedItems = document.querySelectorAll('.expanded');
                expandedItems.forEach(expandedItem => {
                    expandedItem.classList.remove('expanded', 'active');
                    expandedItem.querySelector('.content').classList.add('hidden');
                });
            }
            item.classList.toggle('expanded');
            item.classList.toggle('active');
            const content = item.querySelector('.content');
            content.classList.toggle('hidden');

            if (isMobile) {
                item.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }

            // Animación con GSAP
            gsap.fromTo(item, { scale: 0.9 }, { scale: 1, duration: 0.3 });
        }

        window.addEventListener('resize', () => {
            const isMobile = window.innerWidth <= 640;
            const expandedItems = document.querySelectorAll('.expanded');
            expandedItems.forEach(item => {
                if (isMobile) {
                    item.style.gridColumn = 'span 1';
                    item.style.gridRow = 'span 1';
                } else {
                    item.style.gridColumn = 'span 2';
                    item.style.gridRow = 'span 2';
                }
            });
        });

        // Carrusel
        document.querySelectorAll('.carousel').forEach(carousel => {
            const inner = carousel.querySelector('.carousel-inner');
            const items = carousel.querySelectorAll('.carousel-item');
            let currentIndex = 0;
            let autoSlideInterval;

            function updateCarousel() {
                inner.style.transform = `translateX(-${currentIndex * 100}%)`;
            }

            function startAutoSlide() {
                autoSlideInterval = setInterval(() => {
                    currentIndex = (currentIndex < items.length - 1) ? currentIndex + 1 : 0;
                    updateCarousel();
                }, 3000);
            }

            function stopAutoSlide() {
                clearInterval(autoSlideInterval);
            }

            inner.addEventListener('touchstart', handleTouchStart, false);
            inner.addEventListener('touchmove', handleTouchMove, false);

            let x1 = null;

            function handleTouchStart(evt) {
                const firstTouch = evt.touches[0];
                x1 = firstTouch.clientX;
            }

            function handleTouchMove(evt) {
                if (!x1) {
                    return;
                }

                let x2 = evt.touches[0].clientX;
                let xDiff = x2 - x1;

                if (xDiff > 0) {
                    currentIndex = (currentIndex > 0) ? currentIndex - 1 : items.length - 1;
                } else {
                    currentIndex = (currentIndex < items.length - 1) ? currentIndex + 1 : 0;
                }

                updateCarousel();
                stopAutoSlide();
                startAutoSlide();
                x1 = null;
            }

            startAutoSlide();
        });
    </script>
</body>
</html>
